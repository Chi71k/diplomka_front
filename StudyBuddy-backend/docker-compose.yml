# StudyBuddy backend - local development
# Usage: docker compose up -d
# Then run services locally (go run ./cmd/...) or in IDE

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: studybuddy-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-studybuddy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-studybuddy}
      POSTGRES_DB: ${POSTGRES_DB:-studybuddy}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-studybuddy} -d ${POSTGRES_DB:-studybuddy}"]
      interval: 5s
      timeout: 5s
      retries: 5

  search-service:
    build: ./search-service
    ports:
      - "8083:8083"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-studybuddy}:${POSTGRES_PASSWORD:-studybuddy}@postgres:5432/${POSTGRES_DB:-studybuddy}?sslmode=disable
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy


volumes:
  postgres_data:
